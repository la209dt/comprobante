<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boleta Electrónica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
input { margin: 5px; }
table { margin-top: 10px; border-collapse: collapse; }
td, th { border: 1px solid black; padding: 5px; }
iframe { margin-top: 20px; width: 100%; height: 400px; border: 1px solid #ccc; }
</style>
</head>

<body>

<h2>Boleta Electrónica</h2>

Nombre: <input id="nombre"><br>
Fecha: <input type="date" id="fecha"><br>

<h3>Items</h3>
<table id="tabla">
<tr><th>Concepto</th><th>Monto</th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: <span id="total">0</span></h3>

<button onclick="previewPDF()">👁 Ver PDF</button>
<button onclick="descargarPDF()">⬇ Descargar PDF</button>

<iframe id="preview"></iframe>

<script>

// 📅 Fecha automática
window.onload = function() {
    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;
};

function agregarItem() {
    let tabla = document.getElementById("tabla");
    let row = tabla.insertRow();

    let celda1 = row.insertCell(0);
    let celda2 = row.insertCell(1);

    celda1.innerHTML = '<input>';
    celda2.innerHTML = '<input type="number" oninput="calcularTotal()">';
}

function calcularTotal() {
    let total = 0;
    let inputs = document.querySelectorAll('input[type="number"]');

    inputs.forEach(i => {
        total += Number(i.value) || 0;
    });

    document.getElementById("total").innerText = total;
}

function crearPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value;
    let fecha = document.getElementById("fecha").value;
    let total = document.getElementById("total").innerText;

    doc.text("Boleta Electrónica", 10, 10);
    doc.text("Nombre: " + nombre, 10, 20);
    doc.text("Fecha: " + fecha, 10, 30);

    let y = 40;

    let filas = document.querySelectorAll("#tabla tr");
    filas.forEach((fila, i) => {
        if(i === 0) return;
        let concepto = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        doc.text(concepto + " - $" + monto, 10, y);
        y += 10;
    });

    doc.text("Total: $" + total, 10, y + 10);

    return doc;
}

// 👁 Vista previa
function previewPDF() {
    let doc = crearPDF();
    let blobUrl = doc.output("bloburl");
    document.getElementById("preview").src = blobUrl;
}

// ⬇ Descargar
function descargarPDF() {
    let doc = crearPDF();
    doc.save("boleta.pdf");
}

</script>

</body>
</html>
