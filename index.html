<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comprobante</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1, h2 { text-align: center; }

input { margin: 5px; padding: 5px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid black;
    padding: 5px;
    text-align: center;
}

.header {
    display: flex;
    justify-content: space-between;
}

.logo {
    height: 80px;
}

iframe {
    width: 100%;
    height: 400px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <h3>COMPROBANTE DE PAGO</h3>
        Nº <span id="numero"></span>
    </div>
</div>

<p id="fechaTexto"></p>

Nombre: <input id="nombre"><br>
DNI: <input id="dni"><br>
Licencia: <input id="licencia"><br>

<h3>Método de pago</h3>
<input id="metodo" placeholder="Transferencia">

<table id="tabla">
<tr><th>Descripción</th><th>Monto</th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="previewPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<iframe id="preview"></iframe>

<script>

function fechaLarga() {
    let f = new Date();
    let opciones = { day: 'numeric', month: 'long', year: 'numeric' };
    return "San Carlos Bariloche, " + f.toLocaleDateString('es-AR', opciones);
}

window.onload = () => {
    document.getElementById("fechaTexto").innerText = fechaLarga();

    let num = localStorage.getItem("num") || 1;
    document.getElementById("numero").innerText = "#" + String(num).padStart(5, "0");
};

function agregarItem() {
    let row = document.getElementById("tabla").insertRow();
    row.innerHTML = `
        <td><input></td>
        <td><input type="number" oninput="calcularTotal()"></td>
    `;
}

function calcularTotal() {
    let total = 0;
    document.querySelectorAll('input[type="number"]').forEach(i => {
        total += Number(i.value) || 0;
    });
    document.getElementById("total").innerText = total;
}

async function crearPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value;
    let dni = document.getElementById("dni").value;
    let licencia = document.getElementById("licencia").value;
    let metodo = document.getElementById("metodo").value;
    let total = document.getElementById("total").innerText;
    let numero = document.getElementById("numero").innerText;

    doc.text("COMPROBANTE DE PAGO", 70, 10);
    doc.text("Nº " + numero, 150, 10);

    doc.text(fechaLarga(), 10, 20);

    doc.text("Nombre: " + nombre, 10, 30);
    doc.text("DNI: " + dni, 10, 40);
    doc.text("Licencia: " + licencia, 10, 50);

    doc.text("Método de pago: " + metodo, 10, 60);

    let y = 70;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if(i === 0) return;
        let desc = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        doc.text(desc + " - $" + monto, 10, y);
        y += 10;
    });

    doc.text("Total: $" + total, 10, y + 10);

    doc.text("Firma: Cristian Baldrich", 10, y + 30);

    doc.text("GRACIAS POR SU PREFERENCIA", 50, y + 50);

    return doc;
}

async function previewPDF() {
    let doc = await crearPDF();
    document.getElementById("preview").src = doc.output("bloburl");
}

async function descargarPDF() {
    let doc = await crearPDF();
    doc.save("comprobante.pdf");

    let num = Number(localStorage.getItem("num") || 1);
    localStorage.setItem("num", num + 1);
}

</script>

</body>
</html>
