<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comprobante</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input { margin: 5px; padding: 5px; }

table {
    margin-top: 10px;
    border-collapse: collapse;
    width: 100%;
}

td, th {
    border: 1px solid black;
    padding: 5px;
}

iframe {
    margin-top: 20px;
    width: 100%;
    height: 400px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo-atfa.png" class="logo">

    <div style="text-align:center; flex:1;">
        <h2 style="margin:0;">COMPROBANTE DE PAGO</h2>
        <div>ESCUELA DE TÉCNICOS</div>
        <div>Bariloche, ATFA 209</div>
    </div>

    <div>
        Nº <input id="numero" style="width:100px;">
    </div>
</div>

Datos: <input id="nombre"><br>
Fecha: <input type="date" id="fecha"><br>

<table id="tabla">
<tr><th>Concepto</th><th>Monto</th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="verPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<iframe id="preview"></iframe>

<script>

// 🔢 Número automático editable
window.onload = function() {

    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;

    let num = localStorage.getItem("num") || 1;
    document.getElementById("numero").value = String(num).padStart(5,"0");

    // recuperar items guardados
    let items = JSON.parse(localStorage.getItem("items") || "[]");

    items.forEach(item => agregarItem(item.concepto, item.monto));
};

function agregarItem(concepto = "", monto = "") {
    let tabla = document.getElementById("tabla");
    let row = tabla.insertRow();

    row.innerHTML = `
        <td><input value="${concepto}"></td>
        <td><input type="number" value="${monto}" oninput="calcularTotal()"></td>
    `;
}

function calcularTotal() {
    let total = 0;

    document.querySelectorAll('#tabla tr').forEach((fila, i) => {
        if(i === 0) return;

        let monto = fila.cells[1].querySelector("input").value;
        total += Number(monto) || 0;
    });

    document.getElementById("total").innerText = total;
}

async function crearPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value;
    let fecha = document.getElementById("fecha").value;
    let total = document.getElementById("total").innerText;
    let numero = document.getElementById("numero").value;

    // 🖼 Cargar logo BIEN
    let logo = await cargarImagen("logo-atfa.png");

    doc.addImage(logo, "PNG", 10, 5, 40, 20);

    // 🧾 Encabezado
    doc.text("COMPROBANTE DE PAGO", 60, 10);
    doc.text("ESCUELA DE TÉCNICOS", 60, 18);
    doc.text("Bariloche, ATFA 209", 60, 25);

    doc.text("Nº: " + numero, 150, 10);

    doc.text("Fecha: " + fecha, 10, 35);
    doc.text("Datos: " + nombre, 10, 45);

    let y = 55;

    let items = [];

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if(i === 0) return;

        let concepto = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        items.push({concepto, monto});

        doc.text(concepto + " - $" + monto, 10, y);
        y += 10;
    });

    localStorage.setItem("items", JSON.stringify(items));

    doc.text("Total: $" + total, 10, y + 10);

    return doc;
}

// 👁 Vista previa
function verPDF() {
    let doc = crearPDF();
    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;
}

// ⬇ Descargar
function descargarPDF() {
    let doc = crearPDF();
    doc.save("comprobante.pdf");

    let num = Number(localStorage.getItem("num") || 1);
    localStorage.setItem("num", num + 1);
}
function cargarImagen(src) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.crossOrigin = "anonymous";
        img.src = src;

        img.onload = () => resolve(img);
        img.onerror = reject;
    });
}
</script>

</body>
</html>
