<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comprobante</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

input, textarea, select {
    margin: 5px;
    padding: 5px;
    width: 100%;
}

textarea { height: 80px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid black;
    padding: 5px;
    text-align: center;
}

.header {
    display: flex;
    justify-content: space-between;
}

.logo { height: 80px; }

iframe {
    width: 100%;
    height: 400px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <h3>COMPROBANTE DE PAGO</h3>
        Nº <span id="numero"></span>
    </div>
</div>

Fecha: <input type="date" id="fecha">

<h3>Datos del Alumno</h3>
<textarea id="datos" placeholder="Pegá los datos completos acá"></textarea>

<h3>Método de pago</h3>
<select id="metodo">
    <option>Transferencia</option>
    <option>Efectivo</option>
</select>

<table id="tabla">
<tr><th>Descripción</th><th>Monto</th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="previewPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<iframe id="preview"></iframe>

<script>

// 📅 Fecha automática
window.onload = () => {
    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;

    let num = localStorage.getItem("num") || 1;
    document.getElementById("numero").innerText = "#" + String(num).padStart(5, "0");
};

function agregarItem() {
    let row = document.getElementById("tabla").insertRow();
    row.innerHTML = `
        <td><input></td>
        <td><input type="number" oninput="calcularTotal()"></td>
    `;
}

function calcularTotal() {
    let total = 0;
    document.querySelectorAll('input[type="number"]').forEach(i => {
        total += Number(i.value) || 0;
    });
    document.getElementById("total").innerText = total;
}

// 🧠 Parsear datos
function parsearDatos(texto) {
    let partes = texto.split(" ");

    return {
        licencia: partes.slice(0, 3).join(" "),
        fecha1: partes[3] || "",
        fecha2: partes[4] || "",
        nombre: (partes[5] || "") + " " + (partes[6] || ""),
        dni: partes[partes.length - 1] || ""
    };
}

function fechaFormateada(fechaInput) {
    let f = new Date(fechaInput);
    let opciones = { day: 'numeric', month: 'long', year: 'numeric' };
    return "San Carlos Bariloche, " + f.toLocaleDateString('es-AR', opciones);
}

// 📄 Crear PDF
async function crearPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let fecha = document.getElementById("fecha").value;
    let metodo = document.getElementById("metodo").value;
    let total = document.getElementById("total").innerText;
    let numero = document.getElementById("numero").innerText;

    let datosTexto = document.getElementById("datos").value;

    let datos;
    try {
        datos = parsearDatos(datosTexto);
    } catch {
        datos = {
            licencia: "",
            fecha1: "",
            fecha2: "",
            nombre: datosTexto,
            dni: ""
        };
    }

    doc.text("COMPROBANTE DE PAGO", 60, 10);
    doc.text("Nº " + numero, 150, 10);

    doc.text(fechaFormateada(fecha), 10, 20);

    doc.text("Licencia: " + datos.licencia, 10, 30);
    doc.text("Alumno: " + datos.nombre, 10, 40);
    doc.text("DNI: " + datos.dni, 10, 50);
    doc.text("Período: " + datos.fecha1 + " al " + datos.fecha2, 10, 60);

    doc.text("Método de pago: " + metodo, 10, 70);

    let y = 80;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if(i === 0) return;
        let desc = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        doc.text(desc + " - $" + monto, 10, y);
        y += 10;
    });

    doc.text("Total: $" + total, 10, y + 10);

    // 👇 Imágenes sin romper
    try {
        let firma = await cargarImagen("firma.png");
        doc.addImage(firma, "PNG", 10, y + 20, 50, 20);
    } catch {}

    try {
        let sello = await cargarImagen("sello.png");
        doc.addImage(sello, "PNG", 140, y + 20, 40, 40);
    } catch {}

    doc.text("TÉRMINOS Y CONDICIONES", 10, y + 70);
    doc.text("Este comprobante no sustituye la factura física.", 10, y + 80);

    return doc;
}

// 🖼 Cargar imagen
function cargarImagen(src) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.src = src;
        img.onload = () => resolve(img);
        img.onerror = reject;
    });
}

// 👁 Vista previa
async function previewPDF() {
    let doc = await crearPDF();
    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;
}

// ⬇ Descargar
async function descargarPDF() {
    let doc = await crearPDF();
    doc.save("comprobante.pdf");

    let num = Number(localStorage.getItem("num") || 1);
    localStorage.setItem("num", num + 1);
}

</script>

</body>
</html>
