<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comprobante</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    height: 70px;
}

.center {
    text-align: center;
    flex: 1;
}

input {
    margin: 5px;
    padding: 5px;
    width: 100%;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid black;
    padding: 5px;
}

button {
    margin: 5px;
}

iframe {
    margin-top: 20px;
    width: 100%;
    height: 400px;
}
</style>
</head>

<body>

<div class="header">
    <div style="display:flex; gap:10px;">
        <img src="logo-atfa.png" class="logo">
        <img src="logo_bariloche.png" class="logo">
    </div>

    <div class="center">
        <h2 style="margin:0;">COMPROBANTE DE PAGO</h2>
        <div>ESCUELA DE TÉCNICOS</div>
        <div>Bariloche, ATFA 209</div>
    </div>

    <div>
        Nº <input id="numero" style="width:80px;">
    </div>
</div>

Datos: <input id="datos"><br>
Fecha: <input type="date" id="fecha"><br>

<table id="tabla">
<tr><th>Concepto</th><th>Monto</th><th></th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="verPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<iframe id="preview"></iframe>

<script>
function cargarImagen(src) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.src = src;

        img.onload = () => resolve(img);
        img.onerror = () => reject();
    });
}
// Inicio limpio
window.onload = function() {

    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;

    let num = localStorage.getItem("num") || 1;
    document.getElementById("numero").value = String(num).padStart(5,"0");

    agregarItem(); // SOLO 1 ITEM INICIAL
};

// Agregar ítem
function agregarItem(concepto = "", monto = "") {
    let row = document.getElementById("tabla").insertRow();

    row.innerHTML = `
        <td><input value="${concepto}"></td>
        <td><input type="number" value="${monto}" oninput="calcularTotal()"></td>
        <td><button onclick="eliminarItem(this)">X</button></td>
    `;
}

// Eliminar ítem
function eliminarItem(btn) {
    let row = btn.parentNode.parentNode;
    row.remove();
    calcularTotal();
}

// Total
function calcularTotal() {
    let total = 0;

    document.querySelectorAll('#tabla tr').forEach((fila, i) => {
        if(i === 0) return;

        let monto = fila.cells[1].querySelector("input").value;
        total += Number(monto) || 0;
    });

    document.getElementById("total").innerText = total;
}

// Crear PDF (SIN IMÁGENES para asegurar preview)
async function crearPDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let datos = document.getElementById("datos").value;
    let fecha = document.getElementById("fecha").value;
    let total = document.getElementById("total").innerText;
    let numero = document.getElementById("numero").value;

    // Cargar imágenes
    let logo1, logo2, firma;

    try {
        logo1 = await cargarImagen("logo-atfa.png");
        doc.addImage(logo1, "PNG", 10, 5, 30, 15);
    } catch {}

    try {
        logo2 = await cargarImagen("logo_bariloche.png");
        doc.addImage(logo2, "PNG", 45, 5, 30, 15);
    } catch {}

    // Encabezado
    doc.text("COMPROBANTE DE PAGO", 80, 10);
    doc.text("ESCUELA DE TÉCNICOS", 80, 18);
    doc.text("Bariloche, ATFA 209", 80, 25);

    doc.text("Nº: " + numero, 160, 10);

    doc.text("Fecha: " + fecha, 10, 35);
    doc.text("Datos: " + datos, 10, 45);

    let y = 55;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if(i === 0) return;

        let concepto = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        doc.text(concepto + " - $" + monto, 10, y);
        y += 10;
    });

    doc.text("Total: $" + total, 10, y + 10);

    // FIRMA
    try {
        firma = await cargarImagen("firma_cris.png");
        doc.addImage(firma, "PNG", 130, y + 30, 50, 20);
    } catch {}

    doc.text("DIRECTOR", 145, y + 55);

    // TEXTO FINAL
    doc.text("Este comprobante no sustituye la factura física.", 10, y + 70);

    return doc;
}

// Vista previa MEJORADA
function verPDF() {
    let doc = crearPDF();
    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    window.open(url); // 🔥 abre el PDF directamente
}
// Descargar
function descargarPDF() {
    let doc = crearPDF();
    doc.save("comprobante.pdf");

    let num = Number(localStorage.getItem("num") || 1);
    localStorage.setItem("num", num + 1);
}

</script>

</body>
</html>
