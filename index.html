<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boleta Electrónica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
input { margin: 5px; }
table { margin-top: 10px; border-collapse: collapse; width: 100%; }
td, th { border: 1px solid black; padding: 5px; }
iframe { margin-top: 20px; width: 100%; height: 400px; }
</style>
</head>

<body>

<h2>Comprobante</h2>

Nombre: <input id="nombre"><br>
Fecha: <input type="date" id="fecha"><br>

<table id="tabla">
<tr><th>Concepto</th><th>Monto</th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="verPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<iframe id="preview"></iframe>

<script>

// Fecha automática
window.onload = function() {
    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;
};

function agregarItem() {
    let tabla = document.getElementById("tabla");
    let row = tabla.insertRow();

    row.innerHTML = `
        <td><input></td>
        <td><input type="number" oninput="calcularTotal()"></td>
    `;
}

function calcularTotal() {
    let total = 0;
    document.querySelectorAll('input[type="number"]').forEach(i => {
        total += Number(i.value) || 0;
    });
    document.getElementById("total").innerText = total;
}

function crearPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value;
    let fecha = document.getElementById("fecha").value;
    let total = document.getElementById("total").innerText;

    doc.text("COMPROBANTE", 70, 10);
    doc.text("Nombre: " + nombre, 10, 20);
    doc.text("Fecha: " + fecha, 10, 30);

    let y = 40;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if(i === 0) return;
        let concepto = fila.cells[0].querySelector("input").value;
        let monto = fila.cells[1].querySelector("input").value;

        doc.text(concepto + " - $" + monto, 10, y);
        y += 10;
    });

    doc.text("Total: $" + total, 10, y + 10);

    return doc;
}

// 👁 Vista previa FUNCIONANDO
function verPDF() {
    let doc = crearPDF();
    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;
}

// ⬇ Descargar
function descargarPDF() {
    let doc = crearPDF();
    doc.save("comprobante.pdf");
}

</script>

</body>
</html>
