<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comprobante</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logos {
    display: flex;
    gap: 10px;
}

.logo {
    height: 70px;
    width: auto;
}

.center {
    text-align: center;
    flex: 1;
}

input {
    margin: 5px;
    padding: 5px;
    width: 100%;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid black;
    padding: 5px;
}

button {
    margin: 5px;
}
</style>
</head>

<body>

<div class="header">

    <div class="logos">
        <img src="logo-atfa.png" class="logo">
        <img src="logo_bariloche.png" class="logo">
    </div>

    <div class="center">
        <h2 style="margin:0;">COMPROBANTE DE PAGO</h2>
        <div>ESCUELA DE TÉCNICOS</div>
        <div>Bariloche, ATFA 209</div>
    </div>

    <div>
        Nº <input id="numero" style="width:80px;">
    </div>
</div>

Datos: <input id="datos"><br>
Fecha: <input type="date" id="fecha"><br>

<table id="tabla">
<tr><th>Concepto</th><th>Monto</th><th></th></tr>
</table>

<button onclick="agregarItem()">Agregar ítem</button>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="verPDF()">Ver PDF</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<script>

// ===================== INICIO =====================
window.onload = function() {

    let hoy = new Date().toISOString().split("T")[0];
    document.getElementById("fecha").value = hoy;

    let num = localStorage.getItem("num") || 1;
    document.getElementById("numero").value = String(num).padStart(5,"0");

    agregarItem();
    calcularTotal();
};

// ===================== AGREGAR ITEM =====================
function agregarItem(concepto = "", monto = "") {
    let row = document.getElementById("tabla").insertRow();

    row.innerHTML = `
        <td><input value="${concepto}"></td>
        <td><input type="number" value="${monto}" oninput="calcularTotal()"></td>
        <td><button onclick="eliminarItem(this)">X</button></td>
    `;
}

// ===================== ELIMINAR =====================
function eliminarItem(btn) {
    btn.parentNode.parentNode.remove();
    calcularTotal();
}

// ===================== TOTAL REAL =====================
function calcularTotal() {
    let total = 0;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if (i === 0) return;

        let monto = fila.cells[1].querySelector("input").value;
        total += Number(monto) || 0;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

// ===================== CREAR PDF =====================
function crearPDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let datos = document.getElementById("datos").value;
    let fechaInput = document.getElementById("fecha").value;
    let partes = fechaInput.split("-");
    let fecha = partes[2] + "/" + partes[1] + "/" + partes[0];

    let total = document.getElementById("total").innerText;
    let numero = document.getElementById("numero").value;

    // ================= LOGOS =================
    let logo1 = document.querySelector('img[src="logo-atfa.png"]');
    let logo2 = document.querySelector('img[src="logo_bariloche.png"]');

    try { doc.addImage(logo1, "PNG", 10, 5, 40, 25); } catch {}
    try { doc.addImage(logo2, "PNG", 55, 2, 20, 20); } catch {}

    // ================= ENCABEZADO =================
    doc.setFontSize(14);
    doc.text("COMPROBANTE DE PAGO", 80, 12);
    doc.text("ESCUELA DE TÉCNICOS", 80, 18);
    doc.text("Bariloche, ATFA 209", 80, 24);

    doc.setFontSize(10);
    doc.text("Nº: " + numero, 160, 10);

    let margenX = 15;
    let cajaY = 32;

    doc.rect(margenX, cajaY, 180, 20);
    doc.text("Fecha: " + fecha, margenX + 2, cajaY + 7);
    doc.text("Datos: " + datos, margenX + 2, cajaY + 15);

    // ================= TABLA =================
    let y = cajaY + 35;

    doc.setFontSize(11);
    doc.setFont(undefined, "bold");

    doc.text("Concepto", 15, y);
    doc.text("Monto", 160, y);

    doc.setFont(undefined, "normal");
    y += 8;

    let totalPDF = 0;

    document.querySelectorAll("#tabla tr").forEach((fila, i) => {
        if (i === 0) return;

        let concepto = fila.cells[0].querySelector("input").value;
        let monto = Number(fila.cells[1].querySelector("input").value) || 0;

        totalPDF += monto;

        doc.text(concepto, 15, y);
        doc.text("$" + monto.toFixed(2), 160, y);

        y += 8;
    });

    // ================= TOTAL =================
    y += 5;
    doc.setFont(undefined, "bold");
    doc.text("TOTAL", 15, y);
    doc.text("$" + totalPDF.toFixed(2), 160, y);

    // ================= FIRMA =================
    let firma = new Image();
    firma.src = "firma.png";

    try {
        doc.addImage(firma, "PNG", 125, y + 20, 40, 30);
    } catch {}

    doc.text("DIRECTOR", 125, y + 55);

    doc.text("Este comprobante no sustituye la factura física.", 10, y + 70);

    return doc;
}

// ===================== VISTA =====================
function verPDF() {
    let doc = crearPDF();
    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    window.open(url);
}

// ===================== DESCARGA =====================
function descargarPDF() {
    let doc = crearPDF();
    doc.save("comprobante.pdf");

    let num = Number(localStorage.getItem("num") || 1);
    localStorage.setItem("num", num + 1);
}

</script>

</body>
</html>
